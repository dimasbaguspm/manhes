basePath: /api/v1
consumes:
- application/json
definitions:
  domain.ChapterItem:
    properties:
      chapter:
        type: string
      page_count:
        type: integer
      uploaded_at:
        type: string
    type: object
  domain.ChapterListResponse:
    properties:
      chapters:
        items:
          $ref: '#/definitions/domain.ChapterItem'
        type: array
      id:
        type: string
      lang:
        type: string
    type: object
  domain.ChapterReadResponse:
    properties:
      chapter:
        type: string
      id:
        type: string
      lang:
        type: string
      next_chapter:
        type: string
      pages:
        items:
          type: string
        type: array
      prev_chapter:
        type: string
    type: object
  domain.ChapterStats:
    properties:
      available:
        type: integer
      total:
        type: integer
    type: object
  domain.DictionaryRefreshRequest:
    properties:
      dictionaryId:
        type: string
    type: object
  domain.DictionaryResponse:
    properties:
      best_source:
        additionalProperties:
          type: string
        type: object
      chapters_by_lang:
        additionalProperties:
          type: integer
        type: object
      cover_url:
        type: string
      id:
        type: string
      slug:
        type: string
      source_stats:
        additionalProperties:
          $ref: '#/definitions/domain.SourceStat'
        type: object
      sources:
        additionalProperties:
          type: string
        type: object
      title:
        type: string
      updated_at:
        type: string
    type: object
  domain.MangaDetailResponse:
    properties:
      authors:
        items:
          type: string
        type: array
      cover_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      genres:
        items:
          type: string
        type: array
      id:
        type: string
      languages:
        items:
          $ref: '#/definitions/domain.MangaLangResponse'
        type: array
      state:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  domain.MangaLangResponse:
    properties:
      available_chapters:
        type: integer
      lang:
        type: string
      latest_update:
        type: string
      total_chapters:
        type: integer
      uploaded_chapters:
        type: integer
    type: object
  domain.MangaListResponse:
    properties:
      itemCount:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.MangaSummary'
        type: array
      pageNumber:
        type: integer
      pageSize:
        type: integer
      pageTotal:
        type: integer
    type: object
  domain.MangaSummary:
    properties:
      authors:
        items:
          type: string
        type: array
      chapters_by_lang:
        additionalProperties:
          $ref: '#/definitions/domain.ChapterStats'
        type: object
      cover_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      dictionary_id:
        type: string
      genres:
        items:
          type: string
        type: array
      id:
        type: string
      state:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  domain.SourceStat:
    properties:
      chapters_by_lang:
        additionalProperties:
          type: integer
        type: object
      err:
        type: string
      fetched_at:
        type: string
    type: object
  httputil.ErrorResponse:
    properties:
      code:
        type: string
      details:
        items:
          type: string
        type: array
      message:
        type: string
    type: object
info:
  contact: {}
  description: Manga ingestion and catalog API.
  title: Manhes API
  version: "2.0"
paths:
  /dictionary:
    get:
      description: Results are permanently stored in the dictionary. Re-searching
        a known
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.DictionaryResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Search all scrapers and auto-upsert results into dictionary
      tags:
      - dictionary
  /dictionary/refresh:
    post:
      consumes:
      - application/json
      description: Re-fetches source stats from all known scrapers.
      parameters:
      - description: Dictionary entry ID
        in: body
        name: dictionaryId
        required: true
        schema:
          $ref: '#/definitions/domain.DictionaryRefreshRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Refresh a dictionary entry
      tags:
      - dictionary
  /manga:
    get:
      description: Returns a paginated list of manga. Supports filtering by id, q,
        genre, author, state and sorting.
      parameters:
      - collectionFormat: csv
        description: Filter by dictionary_id (comma-separated or repeated)
        in: query
        items:
          type: string
        name: id
        type: array
      - description: Search by title or description
        in: query
        name: q
        type: string
      - collectionFormat: csv
        description: Filter by genre (comma-separated or repeated)
        in: query
        items:
          type: string
        name: genre
        type: array
      - collectionFormat: csv
        description: Filter by author (comma-separated or repeated)
        in: query
        items:
          type: string
        name: author
        type: array
      - collectionFormat: csv
        description: Filter by state (unavailable|fetching|available)
        in: query
        items:
          type: string
        name: state
        type: array
      - description: 'Sort field: title | updatedAt | createdAt (default: title)'
        in: query
        name: sortBy
        type: string
      - description: 'Sort order: asc | desc (default: asc)'
        in: query
        name: sortOrder
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 100)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MangaListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: List manga
      tags:
      - manga
  /manga/{mangaId}:
    get:
      description: mangaId is the dictionary entry UUID. Unavailable/fetching manga
        return partial detail.
      parameters:
      - description: Dictionary entry UUID
        in: path
        name: mangaId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MangaDetailResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Get manga detail
      tags:
      - manga
  /manga/{mangaId}/{lang}:
    get:
      description: Returns all uploaded chapters for a specific language. Requires
        manga to be in available state.
      parameters:
      - description: Dictionary entry UUID
        in: path
        name: mangaId
        required: true
        type: string
      - description: Language code (e.g. en, fr)
        in: path
        name: lang
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ChapterListResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: List uploaded chapters for a language
      tags:
      - manga
  /manga/{mangaId}/{lang}/read:
    get:
      description: Returns page URLs for the requested chapter along with prev/next
        navigation links. Requires manga to be in available state.
      parameters:
      - description: Dictionary entry UUID
        in: path
        name: mangaId
        required: true
        type: string
      - description: Language code (e.g. en, fr)
        in: path
        name: lang
        required: true
        type: string
      - description: Chapter number
        in: query
        name: chapter
        required: true
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ChapterReadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Get chapter pages
      tags:
      - manga
produces:
- application/json
swagger: "2.0"
