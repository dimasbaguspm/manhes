services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ../.env
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    env_file:
      - ../.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      mc anonymous set public local/${S3_BUCKET}
      "

  redpanda:
    image: redpandadata/redpanda:latest
    command: >
      redpanda start
      --overprovisioned
      --smp 1
      --memory 512M
      --reserve-memory 0M
      --node-id 0
      --check=false
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://redpanda:9092
    restart: unless-stopped
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  manhes:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      APP_ENV: prod
    volumes:
      - library_data:/app/library
      - db_data:/app
    depends_on:
      redpanda:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_data:
  redpanda_data:
  library_data:
  db_data:
