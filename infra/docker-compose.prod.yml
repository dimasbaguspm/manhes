services:
  mysql:
    image: mysql:8.0
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-manhes}
      MYSQL_DATABASE: ${DB_NAME:-manhes}
      MYSQL_USER: ${DB_USER:-manhes}
      MYSQL_PASSWORD: ${DB_PASS:-manhes}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS:-manhes}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ../.env
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    env_file:
      - ../.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      mc anonymous set public local/${S3_BUCKET}
      "

  manhes:
    image: ghcr.io/dimasbaguspm/manhes:nightly
    ports:
      - "8080:8080"
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      APP_ENV: prod
      DB_HOST: mysql
    volumes:
      - library_data:/app/library
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  mysql_data:
  minio_data:
  library_data:
